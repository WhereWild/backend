services:
  gdal:
    build:
      context: .
      dockerfile: Dockerfile
    image: wherewild-gdal
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    init: true
    stdin_open: true
    tty: true # Keep interactive sessions stable.
